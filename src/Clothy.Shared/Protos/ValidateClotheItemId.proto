syntax = "proto3";

message ClotheItemIdToValidate {
  string clotheId = 1;
}

message ClotheItemResponse {
  bool isValid = 1;
  string errorMessage = 2;
  string clotheName = 3;
  string clothePhotoUrl = 4;
}

service ClotheItemIdValidator {
  rpc ValidateClotheItemId (ClotheItemIdToValidate) returns (ClotheItemResponse);
}