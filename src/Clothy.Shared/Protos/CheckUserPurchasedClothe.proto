syntax = "proto3";

message CheckUserPurchasedRequest{
	string userId = 1;
	string clotheId = 2;
}

message CheckUserPurchasedResponse{
	bool purchased = 1;
	string clotheName = 2;
	string clothePhotoURL = 3;
}

service CheckUserPurchasedGrpc{
	rpc CheckUserPurchased(CheckUserPurchasedRequest) returns (CheckUserPurchasedResponse);
} 