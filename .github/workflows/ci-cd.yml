name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [Aggregator, AuthService, BasketService, CatalogService, OrderService, PaymentService, ReviewService]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Run Unit Tests
        run: dotnet test tests/Clothy.${{ matrix.service }}/Clothy.${{ matrix.service }}.UnitTests --verbosity normal

  integration-test:
    name: Integration Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      matrix:
        service: [CatalogService, BasketService, OrderService, PaymentService, ReviewService]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Run Integration Tests
        run: dotnet test tests/Clothy.${{ matrix.service }}/Clothy.${{ matrix.service }}.IntegrationTests --verbosity normal

  contract-test:
    name: Contract Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    strategy:
      matrix:
        service: [CatalogService, OrderService, BasketService, ReviewService, PaymentService]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Run Contract Tests
        run: dotnet test tests/Clothy.${{ matrix.service }}/Clothy.${{ matrix.service }}.ContractTests --verbosity normal

  build-and-push:
    name: Build and Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, contract-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: gateway
            context: ./src
            dockerfile: Clothy.Gateway/Dockerfile
          - service: catalog
            context: ./src
            dockerfile: Clothy.Services/Clothy.CatalogService/Clothy.CatalogService.API/Dockerfile
          - service: basket
            context: ./src
            dockerfile: Clothy.Services/Clothy.BasketService/Clothy.BasketService.API/Dockerfile
          - service: orders
            context: ./src
            dockerfile: Clothy.Services/Clothy.OrderService/Clothy.OrderService.API/Dockerfile
          - service: reviews
            context: ./src
            dockerfile: Clothy.Services/Clothy.ReviewService/Clothy.ReviewService.API/Dockerfile
          - service: auth
            context: ./src
            dockerfile: Clothy.Services/Clothy.AuthService/Clothy.AuthService.API/Dockerfile
          - service: notification
            context: ./src
            dockerfile: Clothy.Services/Clothy.NotificationService/Clothy.NotificationService.API/Dockerfile
          - service: payments
            context: ./src
            dockerfile: Clothy.Services/Clothy.PaymentService/Clothy.PaymentService.API/Dockerfile
          - service: aggregator
            context: ./src
            dockerfile: Clothy.Aggregator/Clothy.Aggregator.API/Dockerfile
          - service: frontend
            context: ./src/Clothy.Frontend
            dockerfile: Dockerfile
          - service: ai-tryon
            context: ./src/Clothy.AI.TryOnService
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/clothy-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max