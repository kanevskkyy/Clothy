name: Clothy.Pulumi
description: A minimal C# Pulumi program
runtime: dotnet
config:
  keycloakUrl:
    description: Keycloak server URL for realm configuration
    default: http://localhost:8080
  adminEmail:
    description: Admin user email address (must be verified sender in SendGrid)
  adminPassword:
    description: Admin user password
    secret: true
  managerEmail:
    description: Manager user email address
  managerPassword:
    description: Manager user password
    secret: true
  userEmail:
    description: Regular user email address
  userPassword:
    description: Regular user password
    secret: true
  smtpFrom:
    description: SMTP From email address (must be verified in SendGrid)
  smtpReplyTo:
    description: SMTP Reply-To email address (optional)
  smtpEnvelopeFrom:
    description: SMTP Envelope From email address (optional)
  sendGridApiKey:
    description: SendGrid API Key for SMTP authentication
    secret: true