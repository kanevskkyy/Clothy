syntax = "proto3";

service ClotheServiceGrpc {
	rpc GetClotheById (ClotheIdGrpcRequest) returns (ClotheDetailGrpcResponse);
}

message ClotheIdGrpcRequest {
	string id = 1;
}

message BrandDetailGrpcResponse {
	string id = 1;
	string name = 2;
	string slug = 3;
	string photoUrl = 4;
}

message ClothingTypeGrpcResponse {
	string id = 1;
	string name = 2;
	string slug = 3;
}

message CollectionGrpcResponse {
	string id = 1;
	string name = 2;
	string slug = 3;
}

message AdditionalPhotoGrpcResponse {
	string id = 1;
	string photoUrl = 2;
	string colorId = 3; 
    bool isMain = 4;
}

message TagGrpcResponse {
	string id = 1;
	string name = 2;
}

message MaterialWithPercentageGrpcResponse {
	string id = 1;
	string name = 2;
	int32 percentage = 3;
}

message SizeGrpc {
	string id = 1;
	string name = 2;
	string slug = 3;
}

message ColorGrpc {
	string id = 1;
	string hexCode = 2;
	string name = 3; 
	string slug = 4;
}

message ClotheStockGrpcResponse {
	string id = 1;
	SizeGrpc size = 2;
	ColorGrpc color = 3;
	int32 quantity = 4;
}

message ClotheDetailGrpcResponse {
	string id = 1;
	string name = 2;
	string slug = 3;
	string description = 4;
	string price = 5; 
	optional string oldPrice = 6;
	optional int32 discountPercentage = 7;
	BrandDetailGrpcResponse brand = 8;
	ClothingTypeGrpcResponse clothingType = 9;
	CollectionGrpcResponse collection = 10;
	repeated AdditionalPhotoGrpcResponse additionalPhotos = 11;
	repeated TagGrpcResponse tags = 12;
	repeated MaterialWithPercentageGrpcResponse materials = 13;
	repeated ClotheStockGrpcResponse stocks = 14;
}